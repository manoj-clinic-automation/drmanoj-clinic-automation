docRoot                   $VH_ROOT/public_html
vhDomain                  $VH_NAME
vhAliases                 www.$VH_NAME
adminEmails               drmanojkragarwal@gmail.com
enableGzip                1
enableIpGeo               1

index  {
  useServer               0
  indexFiles              index.php, index.html
}

errorlog $VH_ROOT/logs/$VH_NAME.error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

accesslog $VH_ROOT/logs/$VH_NAME.access_log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\""
  logHeaders              5
  rollingSize             10M
  keepDays                10
  compressArchive         1
}

scripthandler  {
  add                     lsapi:follo7729 php
}

extprocessor follo7729 {
  type                    lsapi
  address                 UDS://tmp/lshttpd/follo7729.sock
  maxConns                10
  env                     LSAPI_CHILDREN=10
  initTimeout             600
  retryTimeout            0
  persistConn             1
  pcKeepAliveTimeout      1
  respBuffer              0
  autoStart               1
  path                    /usr/local/lsws/lsphp83/bin/lsphp
  extUser                 follo7729
  extGroup                follo7729
  memSoftLimit            1024M
  memHardLimit            1024M
  procSoftLimit           400
  procHardLimit           500
}

phpIniOverride  {

}

module cache {
 storagePath /usr/local/lsws/cachedata/$VH_NAME
}

rewrite  {
 enable                  1
  autoLoadHtaccess        1
}

context /.well-known/acme-challenge {
  location                /usr/local/lsws/Example/html/.well-known/acme-challenge
  allowBrowse             1

  rewrite  {
     enable                  0
  }
  addDefaultCharset       off

  phpIniOverride  {

  }
}


vhssl  {
  keyFile                 /etc/letsencrypt/live/followup.dr-manoj.in/privkey.pem
  certFile                /etc/letsencrypt/live/followup.dr-manoj.in/fullchain.pem
  certChain               1
  sslProtocol             24
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  enableSpdy              15
  enableStapling           1
  ocspRespMaxAge           86400
}

extprocessor wa_receiver {
  type                    proxy
  address                 127.0.0.1:8095
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

extprocessor wa_send_api {
  type                    proxy
  address                 127.0.0.1:8096
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}
extprocessor call_api {
  type                    proxy
  address                 127.0.0.1:8097
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}
# === Reverse proxy for the MyOperator CALL-WEBHOOK capture (Phase A, passive) ===
# ...instructions...

extprocessor call_hook {
  type                    proxy
  address                 127.0.0.1:8098
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}


extprocessor portal_app {
  type                    proxy
  address                 127.0.0.1:8099
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

# === Reverse proxy for the FOLLOW-UP WORKBOOK RECEIVER (Gap A catcher, port 8100) ===
extprocessor followup_recv {
  type                    proxy
  address                 127.0.0.1:8100
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}



context /wa-send {
  type                    proxy
  handler                 wa_send_api
  addDefaultCharset       off
}

context /call {
  type                    proxy
  handler                 call_api
  addDefaultCharset       off
}
context /mo-callhook {
  type                    proxy
  handler                 call_hook
  addDefaultCharset       off
}
context /portal {
  type                    proxy
  handler                 portal_app
  addDefaultCharset       off
}
context /fu-upload {
  type                    proxy
  handler                 followup_recv
  addDefaultCharset       off
}
context /fu-ping {
  type                    proxy
  handler                 followup_recv
  addDefaultCharset       off
}

context / {
  type                    proxy
  handler                 wa_receiver
  addDefaultCharset       off
}
